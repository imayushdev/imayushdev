name: Update profile metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats + top languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg
          output_action: none
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_colors: true

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&background=0D1117&ring=5EEAD4&fire=FF8A65&currStreakLabel=5EEAD4
          path: streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.svg streak.svg
          git diff --cached --quiet || git commit -m "chore: update profile metrics"
          git push
